name: Manual Docker Publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 镜像标签（例如 1.2.3 或 v1.2.3）
        required: true
        type: string
      notes:
        description: 更新日志
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: 规范化标签
        id: tag
        run: |
          RAW="${{ inputs.image_tag }}"
          CLEAN="${RAW#v}"
          echo "tag=$CLEAN" >> "$GITHUB_OUTPUT"
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3
      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3
      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/phowson
            ghcr.io/${{ github.repository_owner }}/phowson
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
      - name: 构建并推送 All-in-One 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.all
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/phowson:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/phowson:${{ steps.tag.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RELEASE_NOTES=${{ inputs.notes }}
