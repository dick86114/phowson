name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 版本号（例如 1.2.3 或 v1.2.3）
        required: true
        type: string
      title:
        description: 发布标题
        required: true
        type: string
      notes:
        description: 更新日志
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 生成标签
        id: vars
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" == v* ]]; then TAG="$VERSION"; else TAG="v$VERSION"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: 创建并推送标签
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.vars.outputs.tag }}" -m "${{ inputs.title }}"
          git push origin "${{ steps.vars.outputs.tag }}"
      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ inputs.title }}
          body: ${{ inputs.notes }}
