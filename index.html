<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="theme-color" content="#137fec" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Phowson" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <title>Phowson - 浮生</title>
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" /> -->
    <script>
      (function () {
        try {
          var key = 'photologs-theme';
          var theme = localStorage.getItem(key) || 'system';
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          var resolved =
            theme === 'system'
              ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
              : theme;
          if (resolved === 'light' || resolved === 'dark') root.classList.add(resolved);
        } catch {}
      })();
    </script>
    <style>
        body {
            background-color: #111a22;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        html.light body {
            background-color: #fcf9f4;
            color: #111827;
        }
        html.dark body {
            background-color: #111a22;
            color: white;
        }
        #phowson-style-recovery {
          position: fixed;
          left: 12px;
          right: 12px;
          bottom: 12px;
          z-index: 9999;
          background: rgba(17, 26, 34, 0.92);
          color: white;
          border: 1px solid rgba(255, 255, 255, 0.12);
          border-radius: 12px;
          padding: 12px 12px;
          backdrop-filter: blur(10px);
          display: none;
        }
        html.light #phowson-style-recovery {
          background: rgba(255, 255, 255, 0.92);
          color: #111827;
          border: 1px solid rgba(0, 0, 0, 0.12);
        }
        #phowson-style-recovery button {
          appearance: none;
          border: 0;
          border-radius: 10px;
          padding: 8px 10px;
          cursor: pointer;
          font-size: 12px;
          font-weight: 600;
        }
        #phowson-style-recovery .primary {
          background: #137fec;
          color: white;
        }
        #phowson-style-recovery .secondary {
          background: rgba(255, 255, 255, 0.12);
          color: inherit;
        }
    </style>
    <script>
      (function () {
        var MAX_RETRIES = 2;
        var retryCountByHref = new Map();
        var hasShown = false;

        function ensureUi() {
          var el = document.getElementById('phowson-style-recovery');
          if (el) return el;
          el = document.createElement('div');
          el.id = 'phowson-style-recovery';
          el.innerHTML =
            '<div style="display:flex;align-items:flex-start;gap:10px;justify-content:space-between">' +
            '<div style="min-width:0">' +
            '<div style="font-size:13px;font-weight:700;line-height:1.2">样式加载失败</div>' +
            '<div id="phowson-style-recovery-text" style="margin-top:4px;font-size:12px;opacity:.85;line-height:1.3">页面样式未能正确加载，可尝试重新加载样式资源。</div>' +
            '</div>' +
            '<div style="display:flex;gap:8px;flex-shrink:0">' +
            '<button class="secondary" type="button" id="phowson-style-retry">重试</button>' +
            '<button class="primary" type="button" id="phowson-style-reload">刷新</button>' +
            '</div>' +
            '</div>';
          (document.body || document.documentElement).appendChild(el);
          return el;
        }

        function show(message) {
          hasShown = true;
          var ui = ensureUi();
          var text = document.getElementById('phowson-style-recovery-text');
          if (text && message) text.textContent = message;
          ui.style.display = 'block';
        }

        function hide() {
          var ui = document.getElementById('phowson-style-recovery');
          if (ui) ui.style.display = 'none';
        }

        function cacheBust(href) {
          var sep = href.indexOf('?') >= 0 ? '&' : '?';
          return href + sep + 'styleRetry=' + Date.now();
        }

        function retryLink(link) {
          var href = String(link.getAttribute('href') || '');
          if (!href) return false;
          var current = retryCountByHref.get(href) || 0;
          if (current >= MAX_RETRIES) return false;
          retryCountByHref.set(href, current + 1);

          var next = link.cloneNode(true);
          next.setAttribute('href', cacheBust(href));
          next.addEventListener('load', function () {
            hide();
          });
          next.addEventListener('error', function () {
            show('样式重试仍失败，可点击“刷新”恢复。');
          });
          link.parentNode && link.parentNode.insertBefore(next, link.nextSibling);
          link.remove();
          return true;
        }

        function attach(link) {
          if (!link || link.__phowson_style_attached) return;
          link.__phowson_style_attached = true;
          link.addEventListener('load', function () {
            if (hasShown) hide();
          });
          link.addEventListener('error', function () {
            if (retryLink(link)) return;
            show('页面样式未能正确加载，可点击“重试”或“刷新”进行恢复。');
          });
        }

        function attachExisting() {
          var links = document.querySelectorAll('link[rel="stylesheet"]');
          for (var i = 0; i < links.length; i += 1) attach(links[i]);
        }

        function observe() {
          var mo = new MutationObserver(function (mutations) {
            for (var i = 0; i < mutations.length; i += 1) {
              var m = mutations[i];
              for (var j = 0; j < m.addedNodes.length; j += 1) {
                var n = m.addedNodes[j];
                if (!n || n.nodeType !== 1) continue;
                if (n.tagName === 'LINK' && n.getAttribute('rel') === 'stylesheet') attach(n);
                var inner = n.querySelectorAll ? n.querySelectorAll('link[rel="stylesheet"]') : [];
                for (var k = 0; k < inner.length; k += 1) attach(inner[k]);
              }
            }
          });
          mo.observe(document.documentElement, { childList: true, subtree: true });
        }

        function bindButtons() {
          document.addEventListener('click', function (e) {
            var t = e.target;
            if (!t) return;
            if (t.id === 'phowson-style-retry') {
              var links = document.querySelectorAll('link[rel="stylesheet"]');
              var did = false;
              for (var i = 0; i < links.length; i += 1) did = retryLink(links[i]) || did;
              if (!did) location.reload();
            }
            if (t.id === 'phowson-style-reload') location.reload();
          });
        }

        function boot() {
          attachExisting();
          observe();
          bindButtons();
        }

        boot();
      })();
    </script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
