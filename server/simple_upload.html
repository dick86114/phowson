<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>简单上传测试</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    .step { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    .step h3 { margin-top: 0; color: #333; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .log { margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 4px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
    .log .error { color: #c00; }
    .log .success { color: #0c0; }
    .log .info { color: #0066cc; }
    input[type="file"] { margin: 10px 0; }
    .preview { max-width: 100%; max-height: 300px; margin-top: 10px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>简单上传测试</h1>

  <div class="step">
    <h3>步骤 1: 选择图片</h3>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
    <div id="previewContainer"></div>
    <div id="fileInfo" class="log"></div>
  </div>

  <div class="step">
    <h3>步骤 2: 登录</h3>
    <input type="email" id="email" value="admin@phowson.com" placeholder="邮箱" style="width: 100%; padding: 8px; margin: 5px 0;">
    <input type="password" id="password" placeholder="密码" style="width: 100%; padding: 8px; margin: 5px 0;">
    <button onclick="login()">登录</button>
    <div id="loginResult" class="log"></div>
  </div>

  <div class="step">
    <h3>步骤 3: 上传</h3>
    <button id="uploadBtn" onclick="upload()" disabled>上传</button>
    <div id="uploadResult" class="log"></div>
  </div>

  <div class="step">
    <h3>日志</h3>
    <button onclick="clearLog()">清空日志</button>
    <div id="log" class="log"></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3001';
    let selectedFile = null;
    let authToken = null;

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = type;
      entry.textContent = `[${time}] ${message}`;
      logDiv.insertBefore(entry, logDiv.firstChild);
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) {
        log('未选择文件', 'error');
        return;
      }

      selectedFile = file;
      log(`选择了文件: ${file.name} (${(file.size / 1024).toFixed(2)} KB, ${file.type})`);

      const previewContainer = document.getElementById('previewContainer');
      const fileInfo = document.getElementById('fileInfo');
      const uploadBtn = document.getElementById('uploadBtn');

      previewContainer.innerHTML = '';
      fileInfo.innerHTML = '';

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'preview';
        previewContainer.appendChild(img);
        log('预览图已生成', 'success');
      };
      reader.onerror = () => {
        log('预览图生成失败', 'error');
      };
      reader.readAsDataURL(file);

      fileInfo.innerHTML = `
        文件名: ${file.name}<br>
        类型: ${file.type}<br>
        大小: ${(file.size / 1024).toFixed(2)} KB<br>
        最后修改: ${new Date(file.lastModified).toLocaleString()}
      `;

      uploadBtn.disabled = false;
    }

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        log('请输入邮箱和密码', 'error');
        return;
      }

      log(`正在登录: ${email}...`);

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          authToken = data.token;
          localStorage.setItem('photologs:auth:token', authToken);
          localStorage.setItem('photologs:auth:user', JSON.stringify(data.user));
          log(`登录成功! Token: ${authToken.substring(0, 20)}...`, 'success');
          document.getElementById('loginResult').innerHTML = `<span class="success">✓ 登录成功</span>`;
        } else {
          log(`登录失败: ${data.message || '未知错误'}`, 'error');
          document.getElementById('loginResult').innerHTML = `<span class="error">✗ ${data.message || '登录失败'}</span>`;
        }
      } catch (err) {
        log(`登录错误: ${err.message}`, 'error');
        document.getElementById('loginResult').innerHTML = `<span class="error">✗ ${err.message}</span>`;
      }
    }

    async function upload() {
      if (!selectedFile) {
        log('请先选择文件', 'error');
        return;
      }

      if (!authToken) {
        log('请先登录', 'error');
        return;
      }

      const uploadBtn = document.getElementById('uploadBtn');
      const uploadResult = document.getElementById('uploadResult');
      
      uploadBtn.disabled = true;
      uploadBtn.textContent = '上传中...';
      uploadResult.innerHTML = '';

      log('开始上传...', 'info');

      const formData = new FormData();
      formData.append('photo', selectedFile);
      formData.append('title', '测试图片');
      formData.append('description', '简单上传测试');
      formData.append('category', 'uncategorized');
      formData.append('tags', 'test,simple');
      formData.append('exif', JSON.stringify({}));

      const startTime = Date.now();

      try {
        log(`发送请求到: ${API_BASE}/photos`, 'info');
        log(`Authorization: Bearer ${authToken.substring(0, 20)}...`, 'info');
        log(`FormData 内容: photo(${selectedFile.name}, ${selectedFile.size} bytes)`, 'info');

        const response = await fetch(`${API_BASE}/photos`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`
          },
          body: formData
        });

        const elapsed = Date.now() - startTime;
        log(`请求完成，耗时: ${elapsed}ms`, 'info');
        log(`响应状态: ${response.status} ${response.statusText}`, 'info');

        const contentType = response.headers.get('content-type');
        let data;
        if (contentType?.includes('application/json')) {
          data = await response.json();
        } else {
          data = await response.text();
        }

        log(`响应数据: ${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}`, 'info');

        if (response.ok) {
          log(`✓ 上传成功! 照片ID: ${data.id}`, 'success');
          uploadResult.innerHTML = `<span class="success">✓ 上传成功! 耗时: ${elapsed}ms</span>`;
          uploadBtn.disabled = false;
          uploadBtn.textContent = '上传';
        } else {
          log(`✗ 上传失败: ${data.message || data || '未知错误'}`, 'error');
          uploadResult.innerHTML = `<span class="error">✗ 上传失败: ${data.message || data || '未知错误'}</span>`;
          uploadBtn.disabled = false;
          uploadBtn.textContent = '上传';
        }
      } catch (err) {
        const elapsed = Date.now() - startTime;
        log(`✗ 上传出错: ${err.message}`, 'error');
        log(`错误堆栈: ${err.stack || '无'}`, 'error');
        uploadResult.innerHTML = `<span class="error">✗ ${err.message} (耗时: ${elapsed}ms)</span>`;
        uploadBtn.disabled = false;
        uploadBtn.textContent = '上传';
      }
    }

    window.onload = () => {
      log('页面已加载', 'info');
      
      const savedToken = localStorage.getItem('photologs:auth:token');
      if (savedToken) {
        authToken = savedToken;
        log(`找到已保存的 token: ${authToken.substring(0, 20)}...`, 'info');
      }
    };
  </script>
</body>
</html>
