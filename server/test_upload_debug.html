<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>上传调试</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .result { margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 4px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
    .error { background: #fee; color: #c00; }
    .success { background: #efe; color: #0c0; }
    .preview { max-width: 200px; margin-top: 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>上传功能调试</h1>

  <div class="section">
    <h3>1. 选择图片</h3>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
    <div id="previewContainer"></div>
    <div id="fileInfo" class="result"></div>
  </div>

  <div class="section">
    <h3>2. 检查认证状态</h3>
    <button onclick="checkAuth()">检查 Token</button>
    <div id="authResult" class="result"></div>
  </div>

  <div class="section">
    <h3>3. 上传图片</h3>
    <button id="uploadBtn" onclick="upload()" disabled>上传</button>
    <div id="uploadResult" class="result"></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3001';
    let selectedFile = null;

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      selectedFile = file;
      const previewContainer = document.getElementById('previewContainer');
      const fileInfo = document.getElementById('fileInfo');
      const uploadBtn = document.getElementById('uploadBtn');

      previewContainer.innerHTML = '';
      fileInfo.textContent = '';

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'preview';
        previewContainer.appendChild(img);

        fileInfo.textContent = JSON.stringify({
          name: file.name,
          type: file.type,
          size: file.size,
          lastModified: new Date(file.lastModified).toISOString()
        }, null, 2);

        uploadBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    function checkAuth() {
      const token = localStorage.getItem('photologs:auth:token');
      const user = localStorage.getItem('photologs:auth:user');
      const result = {
        hasToken: !!token,
        tokenPreview: token ? `${token.substring(0, 20)}...` : 'null',
        hasUser: !!user,
        user: user ? JSON.parse(user) : null
      };
      document.getElementById('authResult').textContent = JSON.stringify(result, null, 2);
    }

    async function upload() {
      if (!selectedFile) {
        alert('请先选择图片');
        return;
      }

      const token = localStorage.getItem('photologs:auth:token');
      if (!token) {
        alert('请先登录');
        return;
      }

      const uploadBtn = document.getElementById('uploadBtn');
      const uploadResult = document.getElementById('uploadResult');
      
      uploadBtn.disabled = true;
      uploadBtn.textContent = '上传中...';
      uploadResult.textContent = '';

      const formData = new FormData();
      formData.append('photo', selectedFile);
      formData.append('title', '测试图片');
      formData.append('description', '调试上传功能');
      formData.append('category', 'uncategorized');
      formData.append('tags', 'test,debug');
      formData.append('exif', JSON.stringify({}));

      const startTime = Date.now();

      try {
        console.log('开始上传...');
        console.log('FormData 内容:');
        for (const [key, value] of formData.entries()) {
          if (value instanceof File) {
            console.log(`  ${key}: File(${value.name}, ${value.size} bytes, ${value.type})`);
          } else {
            console.log(`  ${key}:`, value);
          }
        }

        const res = await fetch(`${API_BASE}/photos`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`
          },
          body: formData
        });

        const elapsed = Date.now() - startTime;
        console.log(`请求耗时: ${elapsed}ms`);
        console.log('响应状态:', res.status, res.statusText);

        const contentType = res.headers.get('content-type');
        let data;
        if (contentType?.includes('application/json')) {
          data = await res.json();
        } else {
          data = await res.text();
        }

        console.log('响应数据:', data);

        if (res.ok) {
          uploadResult.textContent = `上传成功！\n耗时: ${elapsed}ms\n\n响应:\n${JSON.stringify(data, null, 2)}`;
          uploadResult.className = 'result success';
        } else {
          uploadResult.textContent = `上传失败！\n状态码: ${res.status} ${res.statusText}\n耗时: ${elapsed}ms\n\n响应:\n${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}`;
          uploadResult.className = 'result error';
        }
      } catch (err) {
        const elapsed = Date.now() - startTime;
        console.error('上传错误:', err);
        uploadResult.textContent = `上传出错！\n耗时: ${elapsed}ms\n错误信息: ${err.message}\n\n详细信息:\n${err.stack || ''}`;
        uploadResult.className = 'result error';
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = '上传';
      }
    }

    checkAuth();
  </script>
</body>
</html>
